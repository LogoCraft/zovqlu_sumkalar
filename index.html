<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkOku — Linki at, özeti al</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --accent2: #47b3ff;
    --text: #e8e8f0;
    --muted: #555568;
    --user-bubble: #1a1a28;
    --ai-bubble: #0f1a0f;
    --ai-border: #2a4a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 1;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .logo span {
    color: var(--accent2);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    margin-left: auto;
    transition: background 0.3s;
  }
  .status-dot.active { background: #4eff91; box-shadow: 0 0 8px #4eff91; }

  .status-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* LINK INPUT ZONE */
  #link-zone {
    position: relative;
    z-index: 1;
    padding: 20px 24px 0;
    display: flex;
    gap: 10px;
    flex-direction: column;
  }

  .zone-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .link-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  #url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 16px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  #url-input:focus {
    border-color: var(--accent);
  }

  #url-input::placeholder { color: var(--muted); }

  #load-btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    white-space: nowrap;
  }

  #load-btn:hover { opacity: 0.85; }
  #load-btn:active { transform: scale(0.97); }
  #load-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ARTICLE SUMMARY CARD */
  #summary-card {
    display: none;
    margin: 14px 24px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 14px 16px;
    position: relative;
    z-index: 1;
  }

  #summary-card.visible { display: block; }

  .card-tag {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  #summary-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.4;
  }

  #summary-text {
    font-size: 13px;
    color: #999ab0;
    line-height: 1.65;
  }

  #summary-text .loading-dots::after {
    content: '';
    animation: dots 1.2s infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }

  /* CHAT */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  #chat-area::-webkit-scrollbar { width: 4px; }
  #chat-area::-webkit-scrollbar-track { background: transparent; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    background: var(--user-bubble);
    border: 1px solid var(--border);
    align-self: flex-end;
    color: var(--text);
  }

  .msg.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--ai-border);
    align-self: flex-start;
    color: #c8d8c8;
  }

  .msg.ai strong { color: var(--accent); }
  .msg.ai code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: #0a1a0a;
    padding: 1px 5px;
    border-radius: 3px;
  }

  .msg-meta {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 4px;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
    background: var(--ai-bubble);
    border: 1px solid var(--ai-border);
    border-radius: 10px;
    align-self: flex-start;
    animation: msgIn 0.2s ease;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    animation: typingPulse 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingPulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  /* EMPTY STATE */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0.35;
    pointer-events: none;
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 4px;
  }

  .empty-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .empty-sub {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    max-width: 240px;
    line-height: 1.5;
  }

  /* INPUT BAR */
  #input-bar {
    padding: 14px 24px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    position: relative;
    z-index: 1;
    background: rgba(10,10,15,0.95);
  }

  #msg-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    height: 42px;
    max-height: 120px;
  }

  #msg-input:focus { border-color: var(--accent2); }
  #msg-input::placeholder { color: var(--muted); }
  #msg-input:disabled { opacity: 0.4; }

  #send-btn {
    background: var(--accent2);
    color: #0a0a0f;
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  #chat-disabled-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 0 0 4px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }

  /* SCROLLBAR */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<header>
  <div class="logo">Link<span>Oku</span></div>
  <div style="margin-left:auto; display:flex; align-items:center; gap:8px;">
    <span class="status-label" id="status-label">hazır</span>
    <div class="status-dot" id="status-dot"></div>
  </div>
</header>

<div id="link-zone">
  <div class="zone-label">↓ Link yapıştır</div>
  <div class="link-row">
    <input type="text" id="url-input" placeholder="https://..." autocomplete="off" spellcheck="false">
    <button id="load-btn">OKU</button>
  </div>
</div>

<div id="summary-card">
  <div class="card-tag">📄 Özet</div>
  <div id="summary-title"></div>
  <div id="summary-text"></div>
</div>

<div id="chat-area">
  <div id="empty-state">
    <div class="empty-icon">🔗</div>
    <div class="empty-title">Link at, soru sor</div>
    <div class="empty-sub">Yukarıya bir link yapıştır — özetleyeyim, sonra ne sorsan cevaplayayım.</div>
  </div>
</div>

<div id="chat-disabled-hint" style="display:none">önce bir link yükle</div>
<div id="input-bar">
  <textarea id="msg-input" placeholder="Bir şey sor..." disabled rows="1"></textarea>
  <button id="send-btn" disabled>↑</button>
</div>

<script>
const urlInput = document.getElementById('url-input');
const loadBtn = document.getElementById('load-btn');
const summaryCard = document.getElementById('summary-card');
const summaryTitle = document.getElementById('summary-title');
const summaryText = document.getElementById('summary-text');
const chatArea = document.getElementById('chat-area');
const emptyState = document.getElementById('empty-state');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const statusDot = document.getElementById('status-dot');
const statusLabel = document.getElementById('status-label');
const chatDisabledHint = document.getElementById('chat-disabled-hint');

let articleContext = '';
let chatHistory = [];
let isLoading = false;

function setStatus(state) {
  statusDot.className = 'status-dot' + (state === 'active' ? ' active' : '');
  statusLabel.textContent = state === 'active' ? 'çalışıyor' : state === 'ready' ? 'hazır' : 'bekliyor';
}

function scrollBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addMsg(role, text) {
  if (emptyState.parentNode) {
    emptyState.remove();
  }
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = formatText(text);
  chatArea.appendChild(div);
  scrollBottom();
  return div;
}

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typing';
  div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  chatArea.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function callClaude(messages, system) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system,
      messages
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

// LOAD LINK
loadBtn.addEventListener('click', async () => {
  const url = urlInput.value.trim();
  if (!url || !url.startsWith('http')) {
    urlInput.style.borderColor = '#ff4747';
    setTimeout(() => urlInput.style.borderColor = '', 800);
    return;
  }

  loadBtn.disabled = true;
  loadBtn.textContent = '...';
  setStatus('active');
  chatHistory = [];

  summaryCard.classList.add('visible');
  summaryTitle.textContent = '';
  summaryText.innerHTML = '<span class="loading-dots">Sayfa okunuyor</span>';

  try {
    const system = `Sen bir içerik okuma ve özetleme asistanısın. 
Kullanıcı bir URL verecek. Sen bu URL'yi analiz edip içeriği özetleyeceksin.
ÖNEMLI: URL'nin gerçek içeriğini fetch edemezsin, ama URL yapısından ve alan adından ne tür bir içerik olduğunu tahmin edip, genel bir açıklama yapabilirsin. Bunu açıkça belirt.
Türkçe yanıt ver.
Yanıtını şu formatta JSON olarak ver (başka hiçbir şey yazma, sadece JSON):
{
  "title": "Sayfa başlığı veya tahmini konu",
  "summary": "3-5 cümlelik özet veya açıklama",
  "note": "Eğer içerik okunamadıysa buraya kısa not yaz, yoksa boş bırak"
}`;

    const result = await callClaude([
      { role: 'user', content: `Bu URL hakkında bilgi ver ve özet geç: ${url}` }
    ], system);

    let parsed;
    try {
      const clean = result.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch {
      parsed = { title: url, summary: result, note: '' };
    }

    summaryTitle.textContent = parsed.title || url;
    summaryText.innerHTML = formatText(parsed.summary + (parsed.note ? `\n\n<em style="color:#666">${parsed.note}</em>` : ''));

    articleContext = `Kullanıcı şu URL'yi yükledi: ${url}\nBaşlık: ${parsed.title}\nİçerik özeti: ${parsed.summary}`;

    // Enable chat
    msgInput.disabled = false;
    sendBtn.disabled = false;
    chatDisabledHint.style.display = 'none';
    msgInput.focus();
    setStatus('ready');

    // Welcome msg
    addMsg('ai', `Tamam! **${parsed.title}** sayfasını özetledim. Hakkında ne sormak istiyorsun?`);

  } catch (err) {
    summaryText.innerHTML = `<span style="color:#ff6b6b">Hata: ${err.message}</span>`;
    setStatus('ready');
  }

  loadBtn.disabled = false;
  loadBtn.textContent = 'OKU';
});

urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') loadBtn.click();
});

// CHAT
async function sendMessage() {
  if (isLoading) return;
  const text = msgInput.value.trim();
  if (!text) return;

  isLoading = true;
  msgInput.value = '';
  msgInput.style.height = '42px';
  sendBtn.disabled = true;
  msgInput.disabled = true;
  setStatus('active');

  addMsg('user', text);
  chatHistory.push({ role: 'user', content: text });

  showTyping();

  try {
    const system = `Sen bir yardımcı asistansın. Kullanıcı bir web sayfası hakkında sorular soruyor.
İşte sayfa hakkında bilgi:
${articleContext}

Kullanıcının sorularını Türkçe olarak yanıtla. Kısa ve net ol. Markdown kullanabilirsin (**kalın**, \`kod\`).`;

    const reply = await callClaude(chatHistory, system);
    chatHistory.push({ role: 'assistant', content: reply });

    removeTyping();
    addMsg('ai', reply);
  } catch (err) {
    removeTyping();
    addMsg('ai', `Bir hata oluştu: ${err.message}`);
  }

  isLoading = false;
  sendBtn.disabled = false;
  msgInput.disabled = false;
  msgInput.focus();
  setStatus('ready');
}

sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

msgInput.addEventListener('input', () => {
  msgInput.style.height = '42px';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});

// Show hint when chat disabled
document.querySelector('#input-bar').addEventListener('click', () => {
  if (msgInput.disabled) {
    chatDisabledHint.style.display = 'block';
    setTimeout(() => chatDisabledHint.style.display = 'none', 2000);
  }
});
</script>
</body>
</html>
